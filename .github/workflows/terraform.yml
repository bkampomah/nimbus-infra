# .github/workflows/terraform.yml
#
# Home-lab GitOps workflow for Nimbus.
#
# Design:
#   - Pull request   -> terraform fmt + validate + plan (best-effort; plan
#                       will fail network-wise since GitHub runners can't
#                       reach a home LAN, but fmt/validate still catch 90%
#                       of mistakes).
#   - Real applies   -> run manually from your workstation (WSL) with
#                       `terraform apply`. Keeps network path simple.
#   - Nightly        -> drift detection runs plan and files an issue if
#                       state has moved. Same network caveat as PR plan.
#
# If you later add a self-hosted runner on nimbus-mgmt, you can restore the
# apply job — see the commented block at the bottom.

name: terraform

on:
  pull_request:
    branches: [main]
    paths: ['terraform/**', 'cloud-init/**', '.github/workflows/terraform.yml']
  schedule:
    - cron: '17 4 * * *'   # nightly drift check at 04:17 UTC
  workflow_dispatch:       # manual trigger button in the Actions UI

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  WORKING_DIR: terraform

  PROXMOX_VE_ENDPOINT:        ${{ secrets.PROXMOX_VE_ENDPOINT }}
  PROXMOX_VE_API_TOKEN:       ${{ secrets.PROXMOX_VE_API_TOKEN }}
  PROXMOX_VE_SSH_USERNAME:    ${{ secrets.PROXMOX_VE_SSH_USERNAME }}
  PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_VE_SSH_PRIVATE_KEY }}

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: best-effort plan (will fail if Proxmox is unreachable — that's expected)
        id: plan
        continue-on-error: true
        run: |
          terraform init
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt || true

      - name: comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.WORKING_DIR }}/plan.txt';
            const plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'plan step did not produce output';
            const max = 60000;
            const clipped = plan.length > max ? plan.slice(0, max) + '\n...truncated' : plan;
            const note = '> Note: GitHub-hosted runners cannot reach private home-lab Proxmox. Plan failures with "connection refused" or "i/o timeout" are expected. fmt + validate above still caught syntax/typo issues.';
            const body = `### terraform plan\n${note}\n\n\`\`\`hcl\n${clipped}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  drift:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - run: terraform init
      - id: plan
        continue-on-error: true
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color > drift.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
      - name: open issue if drift detected
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('${{ env.WORKING_DIR }}/drift.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Terraform drift detected — ${new Date().toISOString().slice(0,10)}`,
              body: '```\n' + body.slice(0, 60000) + '\n```',
              labels: ['drift', 'infra'],
            });

# ─────────────────────────────────────────────────────────────────────────────
