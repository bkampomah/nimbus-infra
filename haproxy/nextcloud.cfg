# haproxy/nextcloud.cfg
#
# Topology: Cloudflare Tunnel → cloudflared (localhost) → HAProxy → Nextcloud
#
# Why this config differs from a standalone ALB:
#   - No TLS cert. Cloudflare terminates TLS at its edge. HAProxy speaks
#     plain HTTP to cloudflared (over loopback) and to Nextcloud.
#   - HAProxy binds to 127.0.0.1:8080, not 0.0.0.0:443. cloudflared is
#     the ONLY thing that should reach it; nothing else on the ALB VM
#     should be serving traffic publicly.
#   - No HSTS / security headers here — Cloudflare applies those at the
#     edge (Zero Trust → Settings → Network → enable HSTS etc).
#
# If you later want to ALSO expose Nextcloud on the internal domain
# (cloud.nimbus.local) for bastion access, add a second frontend on
# 10.0.1.10:80 — see the commented block at the bottom.

global
    log /dev/log local0
    maxconn 20000
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor except 127.0.0.0/8
    option http-server-close
    timeout connect 10s
    timeout client  300s      # large Nextcloud uploads need generous timeouts
    timeout server  300s
    default-server init-addr last,libc,none

# ─── Frontend: only cloudflared talks to us ─────────────────────────────────
frontend nextcloud-in
    # Loopback only. cloudflared runs on the same VM and reaches us here.
    bind 127.0.0.1:8080

    # Forwarded-* hints so Nextcloud knows the real scheme/host behind CF.
    # These survive the extra hop from cloudflared to HAProxy to Nextcloud.
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host  %[req.hdr(host)]

    # .well-known shortcuts so Nextcloud stops nagging in the admin panel
    http-request redirect location /remote.php/dav/ code 301 if { path /.well-known/carddav }
    http-request redirect location /remote.php/dav/ code 301 if { path /.well-known/caldav }

    default_backend nextcloud_backend

# ─── Backend: nimbus-cloud-01 on :80 ────────────────────────────────────────
backend nextcloud_backend
    option httpchk GET /status.php
    http-check expect status 200

    # CHANGE_ME: replace the IP with the output of
    #     terraform output nextcloud_backend_target
    # Add more `server` lines when you stand up nimbus-cloud-02.
    server cloud-01 10.0.10.20:80 check inter 5s fall 3 rise 2

# ─── (Optional) Second frontend: internal access via cloud.nimbus.local ─────
# Uncomment if you want the bastion / other internal VMs to reach Nextcloud
# directly without going out through Cloudflare.
#
# frontend nextcloud-internal
#     bind 10.0.1.10:80            # CHANGE_ME to nimbus-alb's public-subnet IP
#     http-request set-header X-Forwarded-Proto http
#     default_backend nextcloud_backend
