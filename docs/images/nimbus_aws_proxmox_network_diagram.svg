<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
<title id="title">Nimbus AWS-Style Network on Proxmox</title>
<desc id="desc">Architecture diagram for Nimbus, showing Cloudflare ingress, pfSense edge, Proxmox VPC subnets, application, data, management, monitoring, DNS, and Terraform control plane.</desc>
<defs>
<style>
.bg{fill:#030712}.panel{fill:#0f172a;stroke:#334155;stroke-width:3;rx:24}.vpc{fill:#020617;stroke:#38bdf8;stroke-width:4;rx:28}.subnet{stroke:#e5e7eb;stroke-opacity:.55;stroke-width:2.5;rx:22}.node{fill:#111827;stroke:#e5e7eb;stroke-width:2;rx:15}.title{font:800 34px Arial,sans-serif;fill:#f8fafc}.sub{font:500 17px Arial,sans-serif;fill:#cbd5e1}.h{font:800 22px Arial,sans-serif;fill:#f8fafc}.t{font:700 17px Arial,sans-serif;fill:#f8fafc}.s{font:500 14px Arial,sans-serif;fill:#dbeafe}.xs{font:500 12px Arial,sans-serif;fill:#cbd5e1}.aws{font:800 12px Arial,sans-serif;fill:#111827}.flow{fill:none;stroke:#93c5fd;stroke-width:4;marker-end:url(#a)}.green{fill:none;stroke:#34d399;stroke-width:3;stroke-dasharray:8 8;marker-end:url(#g)}.yellow{fill:none;stroke:#fbbf24;stroke-width:3;stroke-dasharray:7 9;marker-end:url(#y)}
</style>
<linearGradient id="pub" x1="0" x2="1"><stop stop-color="#3b0764"/><stop offset="1" stop-color="#7e22ce"/></linearGradient>
<linearGradient id="app" x1="0" x2="1"><stop stop-color="#082f49"/><stop offset="1" stop-color="#0369a1"/></linearGradient>
<linearGradient id="data" x1="0" x2="1"><stop stop-color="#713f12"/><stop offset="1" stop-color="#ca8a04"/></linearGradient>
<linearGradient id="mgmt" x1="0" x2="1"><stop stop-color="#064e3b"/><stop offset="1" stop-color="#059669"/></linearGradient>
<linearGradient id="aws" x1="0" x2="1"><stop stop-color="#ff9900"/><stop offset="1" stop-color="#facc15"/></linearGradient>
<marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l9 4-9 4z" fill="#93c5fd"/></marker>
<marker id="g" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l9 4-9 4z" fill="#34d399"/></marker>
<marker id="y" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l9 4-9 4z" fill="#fbbf24"/></marker>
</defs>
<rect width="1800" height="1120" class="bg"/>
<circle cx="120" cy="120" r="120" fill="#1d4ed8" opacity=".14"/><circle cx="1650" cy="100" r="170" fill="#7c3aed" opacity=".12"/><circle cx="1640" cy="1010" r="160" fill="#059669" opacity=".10"/>
<text x="60" y="70" class="title">Nimbus — AWS-Style Network on Proxmox</text>
<text x="62" y="103" class="sub">VPC, subnets, EC2, ALB, RDS, S3, Route 53, CloudWatch, and IAM learning patterns implemented with Proxmox, pfSense, Terraform, and FOSS services.</text>
<rect x="55" y="135" width="1690" height="910" class="panel"/>
<text x="85" y="178" class="h">Control, ingress, security, and workload layout</text>
<rect x="90" y="220" width="210" height="100" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2.5"/><text x="112" y="260" class="t">Internet Users</text><text x="112" y="288" class="s">HTTPS clients</text>
<rect x="360" y="220" width="245" height="100" rx="18" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5"/><text x="382" y="260" class="t">Cloudflare Edge</text><text x="382" y="288" class="s">Zero Trust Tunnel</text>
<rect x="670" y="220" width="245" height="100" rx="18" fill="#7f1d1d" stroke="#f87171" stroke-width="2.5"/><text x="692" y="260" class="t">pfSense Edge</text><text x="692" y="288" class="s">IGW · NAT · Router</text>
<rect x="1045" y="200" width="280" height="130" rx="18" fill="#312e81" stroke="#a5b4fc" stroke-width="2.5"/><text x="1068" y="245" class="t">Terraform IaC</text><text x="1068" y="274" class="s">bpg/proxmox provider</text><text x="1068" y="300" class="xs">VMs, DNS, certs, cloud-init</text>
<rect x="1410" y="200" width="280" height="130" rx="18" fill="#422006" stroke="#f59e0b" stroke-width="2.5"/><text x="1432" y="245" class="t">AWS Learning Map</text><text x="1432" y="274" class="s">VPC · EC2 · ALB · RDS · S3</text><text x="1432" y="300" class="xs">Route 53 · CloudWatch · IAM</text>
<path d="M300 270h60" class="flow"/><path d="M605 270h65" class="flow"/>
<rect x="90" y="385" width="1600" height="520" class="vpc"/>
<text x="120" y="430" class="h">Proxmox host: nimbus-region-1</text><text x="120" y="456" class="s">Nimbus VPC 10.0.0.0/16 · Proxmox SDN Zone/VNets · pfSense routed tiers</text>
<rect x="120" y="505" width="200" height="145" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="2.5"/><text x="145" y="548" class="t">VPC Edge</text><text x="145" y="577" class="s">pfSense VM</text><text x="145" y="605" class="xs">WAN home LAN</text><text x="145" y="628" class="xs">GW .1 per subnet</text>
<rect x="365" y="495" width="290" height="230" class="subnet" fill="url(#pub)"/><text x="390" y="535" class="h">Public subnet</text><text x="390" y="562" class="s">10.0.1.0/24</text><rect x="390" y="590" width="240" height="50" class="node"/><text x="410" y="621" class="t">nimbus-alb</text><text x="410" y="638" class="xs">10.0.1.10 · HAProxy + cloudflared</text><rect x="390" y="658" width="240" height="45" class="node"/><text x="410" y="687" class="t">nimbus-bastion</text>
<rect x="705" y="495" width="320" height="230" class="subnet" fill="url(#app)"/><text x="730" y="535" class="h">App subnet</text><text x="730" y="562" class="s">10.0.10.0/24</text><rect x="730" y="590" width="270" height="50" class="node"/><text x="750" y="621" class="t">nimbus-cloud-01</text><text x="750" y="638" class="xs">10.0.10.102 · Nextcloud 30</text><rect x="730" y="658" width="270" height="45" class="node"/><text x="750" y="687" class="t">nimbus-aio</text>
<rect x="1075" y="495" width="270" height="230" class="subnet" fill="url(#data)"/><text x="1100" y="535" class="h">Data subnet</text><text x="1100" y="562" class="s">10.0.20.0/24</text><rect x="1100" y="590" width="220" height="50" class="node"/><text x="1120" y="621" class="t">nimbus-rds</text><text x="1120" y="638" class="xs">PostgreSQL 16</text><rect x="1100" y="658" width="220" height="45" class="node"/><text x="1120" y="687" class="t">nimbus-s3</text>
<rect x="1395" y="495" width="260" height="230" class="subnet" fill="url(#mgmt)"/><text x="1420" y="535" class="h">Mgmt subnet</text><text x="1420" y="562" class="s">10.0.100.0/24</text><rect x="1420" y="590" width="210" height="50" class="node"/><text x="1440" y="621" class="t">nimbus-dns</text><text x="1440" y="638" class="xs">PowerDNS</text><rect x="1420" y="658" width="210" height="45" class="node"/><text x="1440" y="687" class="t">nimbus-mon</text>
<path d="M320 578c40 0 50 37 70 37" class="flow"/><path d="M630 615h100" class="flow"/><text x="645" y="596" class="xs">host-header routes</text><path d="M1000 615h100" class="yellow"/><text x="1030" y="598" class="xs">:5432</text><path d="M1000 638c42 35 55 40 100 43" class="yellow"/><text x="1030" y="675" class="xs">S3 API</text><path d="M1210 640v18" class="yellow"/><text x="1225" y="657" class="xs">WAL</text>
<path d="M1420 615c-260-170-710-165-790-20" class="green"/><text x="910" y="490" class="xs">split-horizon DNS: *.nimbus.local</text><path d="M510 703c285 165 710 170 1015 0" class="green"/><text x="735" y="825" class="xs">node-exporter + promtail + syslog + auth.log streams to Prometheus/Grafana/Loki</text><path d="M1185 330c-40 40-220 58-320 165" class="green"/><path d="M1185 330c160 65 310 90 340 165" class="green"/>
<rect x="120" y="760" width="330" height="105" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/><text x="145" y="795" class="t">Security Boundary</text><text x="145" y="825" class="s">pfSense policy + UFW per VM</text><text x="145" y="848" class="xs">Public ingress through ALB/bastion only.</text>
<rect x="500" y="760" width="360" height="105" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/><text x="525" y="795" class="t">Application Path</text><text x="525" y="825" class="s">Cloudflare Tunnel → HAProxy → Nextcloud</text><text x="525" y="848" class="xs">AIO remains available as rollback target.</text>
<rect x="910" y="760" width="330" height="105" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/><text x="935" y="795" class="t">Data Services</text><text x="935" y="825" class="s">PostgreSQL metadata + MinIO object data</text><text x="935" y="848" class="xs">WAL archives flow to object storage.</text>
<rect x="1290" y="760" width="330" height="105" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/><text x="1315" y="795" class="t">Operations</text><text x="1315" y="825" class="s">CloudWatch-style observability stack</text><text x="1315" y="848" class="xs">Metrics, logs, dashboards, alerting base.</text>
<rect x="90" y="945" width="1600" height="65" rx="18" fill="#020617" stroke="#334155" stroke-width="2"/><text x="120" y="985" class="t">AWS equivalents:</text><g transform="translate(300 960)"><rect width="78" height="30" rx="13" fill="url(#aws)"/><text x="20" y="20" class="aws">VPC</text></g><text x="390" y="981" class="xs">Proxmox SDN</text><g transform="translate(535 960)"><rect width="78" height="30" rx="13" fill="url(#aws)"/><text x="20" y="20" class="aws">EC2</text></g><text x="625" y="981" class="xs">VMs</text><g transform="translate(735 960)"><rect width="78" height="30" rx="13" fill="url(#aws)"/><text x="19" y="20" class="aws">ALB</text></g><text x="825" y="981" class="xs">HAProxy</text><g transform="translate(960 960)"><rect width="78" height="30" rx="13" fill="url(#aws)"/><text x="19" y="20" class="aws">RDS</text></g><text x="1050" y="981" class="xs">PostgreSQL</text><g transform="translate(1220 960)"><rect width="78" height="30" rx="13" fill="url(#aws)"/><text x="27" y="20" class="aws">S3</text></g><text x="1310" y="981" class="xs">MinIO</text><g transform="translate(1450 960)"><rect width="92" height="30" rx="13" fill="url(#aws)"/><text x="18" y="20" class="aws">Route53</text></g><text x="1555" y="981" class="xs">PowerDNS</text>
<text x="60" y="1085" class="xs" fill="#94a3b8">Generated for bkampomah/nimbus-infra · Nimbus AWS-style network on Proxmox · Terraform-managed lab architecture</text>
</svg>
